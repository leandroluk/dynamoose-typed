name: Add Contributor

on:
  issue_comment:
    types: [created]

jobs:
  add-contributor:
    if: contains(github.event.comment.body, '@all-contributors') && contains(github.event.comment.body, 'please add')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add contributor
        uses: all-contributors/all-contributors-action@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
