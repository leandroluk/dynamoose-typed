name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LEFTHOOK: "0"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm tsc

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test Coverage
        run: pnpm test:coverage

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    name: Publish to NPM
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version changes
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git show-ref --tags "refs/tags/v$VERSION" --quiet; then
            echo "Version v$VERSION already exists. Skipping publish."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$VERSION detected. Will publish."
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Download dist artifact
        if: steps.check.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package
        if: steps.check.outputs.publish == 'true'
        run: |
          npm install -g npm@latest sigstore
          npm pkg delete scripts.prepare
          npm publish --access public --provenance --loglevel verbose

      - name: Create and push tag
        if: steps.check.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.check.outputs.version }}
          git push origin ${{ steps.check.outputs.version }}