<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamoose Typed</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A strongly-typed, decorator-driven wrapper around Dynamoose">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Estilo Docsify Themeable (Tema Simple) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <!-- Tema de destaque de código (Prism Tomorrow) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  
  <style>
    :root {
      /* Variáveis de estilo premium */
      --theme-color: #3b82f6;
      --base-font-size: 16px;
      --heading-color: #1e293b;
      --strong-color: #0f172a;
      --sidebar-background: #f8fafc;
      --sidebar-width: 280px;
      --content-max-width: 900px;
      --code-theme-background: #2d2d2d;
      --code-inline-background: #f1f5f9;
      --code-inline-color: #0f172a;
      --code-inline-border-radius: 4px;
    }
    
    /* Ajustes finos de visual */
    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    .markdown-section pre {
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      border: 1px solid #3e3e3e;
      margin: 1.5em 0;
      background-color: #2d2d2d !important;
    }

    .markdown-section pre code {
      color: #f8f8f2 !important;
      font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace !important;
    }
    
    .sidebar {
      border-right: 1px solid #e2e8f0;
    }
    
    .sidebar-nav li a {
      font-weight: 500;
      color: #64748b;
      transition: color 0.2s ease;
    }
    
    .sidebar-nav li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      border-right: 2px solid var(--theme-color);
    }

    /* Ajuste do banner centralizado */
    .markdown-section img[alt="Dynamoose Typed"] {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Dynamoose Typed',
      repo: 'https://github.com/leandroluk/dynamoose-typed',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results found!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Copy',
        errorText  : 'Error',
        successText: 'Copied!'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Destaque de sintaxe adicional (Prism) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
