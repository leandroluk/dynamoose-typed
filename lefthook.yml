pre-commit:
  parallel: false
  commands:
    typecheck:
      run: pnpm tsc
    format:
      run: pnpm format
    lint:
      run: pnpm lint

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm tsc
    format:
      run: pnpm format
    lint:
      run: pnpm lint
    test:
      run: pnpm test:coverage
